version: "3.9"

services:
  backend:
    build: ./backend
    container_name: recommender-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/models:/app/models
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=file:///app/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    container_name: recommender-ui
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.0
    container_name: recommender-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri file:///mlruns
